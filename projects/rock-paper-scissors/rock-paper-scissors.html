<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Камень, ножницы, бумага</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Заставка -->
<div id="splash">
    <h1>Камень Ножницы Бумага</h1>
    <div class="credit">by:BANANCHIKIREAL</div>
</div>

<!-- ❄️ СНЕГ -->
<div id="snowflake-container"></div>

<div class="game-container" id="mainGame">
    <h1 class="main-title">🎮 Камень Ножницы Бумага</h1>

    <!-- Счёт -->
    <div class="score-board">
        <div class="score-item">
            <div class="score-label">👤 Игрок</div>
            <div class="score-value" id="player-wins">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">🤖 Бот</div>
            <div class="score-value" id="bot-wins">0</div>
        </div>
    </div>

    <p>Выбери свой ход:</p>

    <div class="buttons">
        <button id="rock" onclick="playGame('камень')">🪨</button>
        <button id="paper" onclick="playGame('бумага')">📄</button>
        <button id="scissors" onclick="playGame('ножницы')">✂️</button>
    </div>

    <div id="result" class="result">
        <p>Готов? Сделай ход!</p>
    </div>

    <button class="action-btn reset-btn" onclick="resetGame()">🔄 НОВАЯ ИГРА</button>
    <a href="../../whole_index/index.html" class="action-btn home-btn">🏠 Вернуться на портфолио</a>
</div>
<script src="script.js"></script>
</body>
</html>
