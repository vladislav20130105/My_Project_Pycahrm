<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Угадай Цвет — Игра</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ❄️ СНЕГ -->
<div id="snowflake-container"></div>

<!-- ЗАСТАВКА -->
<div id="splash-screen">
    <h1 id="splash-title">Угадай Цвет</h1>
    <p id="splash-subtitle">by: BANANCHIKIREAL</p>
</div>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<div id="content-wrapper">
    <div class="game-container" id="gameContainer">
        <h1 class="title">Угадай Цвет</h1>

        <!-- Меню выбора сложности -->
        <div id="modeScreen">
            <p class="hint">Выберите сложность:</p>
            <div class="mode-buttons" id="modeButtons">
                <button class="mode-btn" data-count="6">6 цветов</button>
                <button class="mode-btn" data-count="12">12 цветов</button>
                <button class="mode-btn" data-count="24">24 цвета</button>
            </div>
        </div>

        <!-- Игровой экран -->
        <div id="gameScreen" style="display: none;">
            <div class="color-display" id="colorDisplay"></div>
            <div class="hint" id="hint">Загадан один из цветов ниже. Попробуй угадать!</div>
            <div class="guess-buttons" id="guessButtons"></div>

            <div class="controls">
                <button class="btn-restart" id="restartBtn">🔄 Новая игра</button>
            </div>
        </div>
    </div>

    <!-- ✅ КНОПКА ПОД КАРТОЧКОЙ МЕНЮ -->
    <a href="../../whole_index/index.html" class="back-to-portfolio" id="backButton">🏠 Вернуться на портфолио</a>
</div>
<script src="script.js"></script>
</body>
</html>
