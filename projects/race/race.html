<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гонка на выживание</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=block" rel="stylesheet"
          media="all">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- ✅ ЗАСТАВКА С НАДПИСЬЮ -->
<div id="splash-screen">
    <h1 id="splash-title">гонка на выживание</h1>
    <p id="splash-subtitle">by: BANANCHIKIREAL</p>
</div>

<!-- ❄️ СНЕГ -->
<div id="snowflake-container"></div>

<div class="game-wrapper">
    <div class="game-header">
        <h1>Гонка на выживание</h1>
    </div>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-label">ОЧКИ</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">СКОРОСТЬ</div>
            <div class="stat-value" id="speed">1</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">РЕКОРД</div>
            <div class="stat-value" id="highScore">0</div>
        </div>
    </div>

    <div style="position: relative; display: block;">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="game-over" id="gameOver">
            <h2>💥 Игра окончена!</h2>
            <p>Ваши очки: <span class="final-value" id="finalScore">0</span></p>
            <p>Лучший результат: <span class="final-value" id="finalHighScore">0</span></p>
            <button class="btn-game btn-restart" onclick="startGame()">🔄 Играть снова</button>
        </div>
    </div>

    <div class="controls">
        <p>⬅️ <span class="key-hint">A</span> или <span class="key-hint">←</span> — Влево</p>
        <p>➡️ <span class="key-hint">D</span> или <span class="key-hint">→</span> — Вправо</p>
        <p>⏸️ <span class="key-hint">ПРОБЕЛ</span> — Пауза</p>
        <div class="btn-group">
            <button class="btn-game btn-start" id="startBtn" onclick="startGame()">🚀 Начать игру</button>
            <button class="btn-game btn-restart" id="pauseBtn" onclick="togglePause()" style="display: none;">⏸️ Пауза
            </button>
        </div>
    </div>

    <!-- ✅ ТОЛЬКО КНОПКА "ВЕРНУТЬСЯ", без "by: ..." -->
    <a href="../../whole_index/index.html" class="back-link">🏠 Вернуться на портфолио</a>
</div>
<script src="script.js"></script>
</body>
</html>
