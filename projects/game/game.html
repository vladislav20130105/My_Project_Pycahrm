<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Три Стаканчика — Киберстиль</title>

    <!-- Bootstrap + Иконки + Orbitron -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Заставка -->
<div id="splash">
    <h1>Три Стаканчика</h1>
    <div class="credit">by:BANANCHIKIREAL</div>
</div>

<!-- ❄️ СНЕГ -->
<div id="snowflake-container"></div>

<div id="main-content">
    <h1 class="main-title">✨ Три Стаканчика ✨</h1>

    <!-- Кнопка "Вернуться на портфолио" -->
    <div class="text-center my-3">
        <a href="../../whole%20index/index.html" class="btn btn-pink px-4 py-2">🏠 Вернуться на портфолио</a>
    </div>

    <div class="score-board">
        <div class="score-item">
            <div class="score-label">ПОБЕД</div>
            <div class="score-value" id="wins">0</div>
        </div>
        <div class="score-item">
            <div class="score-label">ПОРАЖЕНИЙ</div>
            <div class="score-value" id="losses">0</div>
        </div>
    </div>

    <div id="message">Выбери уровень сложности</div>

    <div class="d-flex justify-content-center gap-2 mb-3">
        <button class="btn btn-sm btn-level active" data-level="easy">Лёгкий</button>
        <button class="btn btn-sm btn-level" data-level="medium">Средний</button>
        <button class="btn btn-sm btn-level" data-level="hard">Сложный</button>
    </div>

    <div class="text-center">
        <button id="start" class="btn btn-outline-cyan px-4 py-2">Начать игру</button>
    </div>

    <div id="game">
        <div class="cup" id="cup0">
            <div class="ball" id="ball0"></div>
        </div>
        <div class="cup" id="cup1">
            <div class="ball" id="ball1"></div>
        </div>
        <div class="cup" id="cup2">
            <div class="ball" id="ball2"></div>
        </div>
    </div>

    <div class="text-center">
        <button id="reset" class="btn btn-pink px-4 py-2">Играть снова</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
